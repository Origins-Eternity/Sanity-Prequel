name: CI Build Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Prepare artifact name
        id: prep
        run: |
          BASE_NAME=$(grep "^modArchivesBaseName=" gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          VERSION=$(grep "^modVersion=" gradle.properties | cut -d'=' -f2 | tr -d ' \r\n')
          echo "artifact_name=${BASE_NAME}-${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload built JAR as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prep.outputs.artifact_name }}
          path: build/libs/*.jar
